<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Cover the viewport with a 16:9 iframe, oversized to crop YouTube's title/branding off-screen */
    .video-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: max(115vw, 204.45vh);  /* 115vh * 16/9 */
      height: max(64.6875vw, 115vh); /* 115vw * 9/16 */
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 0;
    }

    /* Black fade-in overlay hides the initial YouTube poster/play-button flash, fades out once playing */
    .video-cover {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .video-cover.hidden { opacity: 0; }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: transparent;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .logo:hover { opacity: 0.85; }

    .burger {
      width: 32px;
      height: 24px;
      position: relative;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      z-index: 11;
    }

    .burger span {
      display: block;
      position: absolute;
      height: 3px;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, opacity 0.3s ease, top 0.3s ease;
    }

    .burger span:nth-child(1) { top: 0; }
    .burger span:nth-child(2) { top: 10px; }
    .burger span:nth-child(3) { top: 20px; }

    .burger.open span:nth-child(1) {
      top: 10px;
      transform: rotate(45deg);
    }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) {
      top: 10px;
      transform: rotate(-45deg);
    }

    .menu {
      position: fixed;
      top: 70px;
      right: 40px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 12px 0;
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
      z-index: 10;
    }

    .menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .menu a {
      display: block;
      padding: 12px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      transition: background 0.2s ease;
    }

    .menu a:hover { background: rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">Home</a>
    <button class="burger" id="burger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <nav class="menu" id="menu">
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="video-wrapper">
    <iframe
      id="hero-video"
      src="https://www.youtube.com/embed/tppjGGHlAG4?autoplay=1&mute=1&loop=1&playlist=tppjGGHlAG4&controls=0&fs=0&iv_load_policy=3&modestbranding=1&playsinline=1&rel=0&enablejsapi=1"
      title="Hero video"
      frameborder="0"
      allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      tabindex="-1">
    </iframe>
    <div class="video-cover" id="videoCover"></div>
  </div>

  <script>
    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');

    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      burger.classList.toggle('open');
      menu.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && !burger.contains(e.target)) {
        burger.classList.remove('open');
        menu.classList.remove('open');
      }
    });

    // Load YouTube IFrame API for reliable autoplay/mute/loop control and to know when to fade in
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;
    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('hero-video', {
        events: {
          onReady: (e) => {
            e.target.mute();
            e.target.playVideo();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              document.getElementById('videoCover').classList.add('hidden');
            }
            if (e.data === YT.PlayerState.ENDED) {
              e.target.seekTo(0);
              e.target.playVideo();
            }
          },
        },
      });
    };

    // Safety fallback: hide cover after 4s even if API doesn't load
    setTimeout(() => {
      document.getElementById('videoCover').classList.add('hidden');
    }, 4000);
  </script>
</body>
</html>
